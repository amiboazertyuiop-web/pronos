name: Recover yesterday matches
on:
  workflow_dispatch: {}
jobs:
  recover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Recover finished matches
        env:
          FLASHSCORE_KEY: ${{ secrets.FLASHSCORE_KEY }}
        run: node scripts/recover-yesterday.js
      - name: Commit and push if changed
        run: |
          git config user.email 'coach-parie-bot@users.noreply.github.com'
          git config user.name 'Coach Parie Bot'
          if git diff --quiet -- pronos.json; then
            echo "No changes"
          else
            git add pronos.json
            git commit -m "chore: recover yesterday's match results into history"
            git push
          fi
