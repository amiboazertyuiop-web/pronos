name: Probe Flashscore markets
on:
  workflow_dispatch: {}
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Probe odds for Tennis/NBA/MMA
        env:
          FLASHSCORE_KEY: ${{ secrets.FLASHSCORE_KEY }}
        run: node scripts/probe-flashscore-odds.js
