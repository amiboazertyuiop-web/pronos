name: Daily pronos refresh
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}
concurrency:
  group: pronos-main
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate pronos.json
        env:
          FLASHSCORE_KEY: ${{ secrets.FLASHSCORE_KEY }}
        run: node scripts/generate-pronos.js
      - name: Write analyses via Claude Haiku
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/analyse-pronos.js
      - name: Commit and push if changed
        run: |
          git config user.email 'coach-parie-bot@users.noreply.github.com'
          git config user.name 'Coach Parie Bot'
          if git diff --quiet -- pronos.json; then
            echo "No changes"
          else
            git add pronos.json
            git commit -m "chore(pronos): daily refresh"
            git push
          fi
      - name: Send daily recap email
        if: ${{ success() }}
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/send-daily-email.js
